# StyleForge 模型配置 — 根据环境自动选择模型
# environment: local (8GB) | cloud_4090 (24GB)

environment: local

# 图像生成模型
image:
  txt2img:
    local:
      unet: "qwen_image_fp8_e4m3fn.safetensors"
      clip: "qwen_2.5_vl_7b_fp8_scaled.safetensors"
      clip_type: "qwen_image"
      vae: "qwen_image_vae.safetensors"
      max_resolution: 512
      steps: 12
      cfg: 3.5
    cloud_4090:
      unet: "qwen_image_fp8_e4m3fn.safetensors"
      clip: "qwen_2.5_vl_7b_fp8_scaled.safetensors"
      clip_type: "qwen_image"
      vae: "qwen_image_vae.safetensors"
      max_resolution: 2048
      steps: 20
      cfg: 3.5

  # Ideogram 4 — 文字渲染/排版设计最强开源模型 (9.3B DiT, NF4=单卡24GB)
  # 替换原 SDXL 的"备用"角色, 已成为主力设计模型
  ideogram4:
    local:
      unet: "ideogram4-nf4\\diffusion_models\\ideogram_4_nf4.safetensors"
      clip: "ideogram4-nf4\\text_encoders\\model-00001-of-00004.safetensors"
      clip_type: "ideogram4"
      vae: "ideogram4-nf4\\vae\\model.safetensors"
      max_resolution: 2048
      steps: 10
      cfg: 0.0
    cloud_4090:
      unet: "ideogram4-fp8\\diffusion_models\\ideogram_4.safetensors"
      clip: "ideogram4-fp8\\text_encoders\\model-00001-of-00004.safetensors"
      clip_type: "ideogram4"
      vae: "ideogram4-fp8\\vae\\model.safetensors"
      max_resolution: 2048
      steps: 10
      cfg: 0.0

  # FLUX.2 Klein 4B — 写实摄影/自然场景 (4B DiT)
  flux2:
    local:
      unet: "flux-2-klein-4b\\diffusion_models\\flux2_klein_4b_fp8.safetensors"
      clip: "flux-2-klein-4b\\text_encoders\\clip_l.safetensors"
      t5: "flux-2-klein-4b\\text_encoders\\t5xxl_fp16.safetensors"
      clip_type: "flux2"
      vae: "flux-2-klein-4b\\vae\\ae.safetensors"
      max_resolution: 1024
      steps: 25
      cfg: 2.0
    cloud_4090:
      unet: "flux-2-klein-4b\\diffusion_models\\flux2_klein_4b_fp16.safetensors"
      clip: "flux-2-klein-4b\\text_encoders\\clip_l.safetensors"
      t5: "flux-2-klein-4b\\text_encoders\\t5xxl_fp16.safetensors"
      clip_type: "flux2"
      vae: "flux-2-klein-4b\\vae\\ae.safetensors"
      max_resolution: 2048
      steps: 25
      cfg: 2.0

# 视频生成模型
video:
  t2v:
    local:
      unet: "wan\\wan2.1_t2v_1.3b.safetensors"
      clip: "wan_t5\\text_encoder\\model-00001-of-00003.safetensors"
      clip_type: "wan"
      vae: "wan\\Wan2.1_VAE.pth"
      max_resolution: "480p (832x480)"
      length: 81
      steps: 20
      cfg: 4.0
    cloud_4090:
      # Wan 2.1 T2V 14B — 需下载到 models/diffusion_models/wan/
      unet: "wan\\wan2.1_t2v_14b_fp8.safetensors"
      clip: "wan_t5\\text_encoder\\model-00001-of-00003.safetensors"
      clip_type: "wan"
      vae: "wan\\Wan2.1_VAE.pth"
      max_resolution: "720p (1280x720)"
      length: 81
      steps: 20
      cfg: 4.0

  i2v:
    local:
      # 本地用 T2V 1.3B + start_image 模拟 I2V
      unet: "wan\\wan2.1_t2v_1.3b.safetensors"
      clip: "wan_t5\\text_encoder\\model-00001-of-00003.safetensors"
      clip_type: "wan"
      vae: "wan\\Wan2.1_VAE.pth"
      max_resolution: "480p (832x480)"
      length: 81
    cloud_4090:
      # Wan 2.1 I2V 14B — 真正的图生视频模型
      # 需下载到 models/diffusion_models/wan/
      unet: "wan\\wan2.1_i2v_14b_fp8.safetensors"
      clip: "wan_t5\\text_encoder\\model-00001-of-00003.safetensors"
      clip_type: "wan"
      vae: "wan\\Wan2.1_VAE.pth"
      max_resolution: "720p (1280x720)"
      length: 81

# 换脸 (本地和云端相同)
faceswap:
  swap_model: "inswapper_128.onnx"
  face_detection: "retinaface_resnet50"
  face_restore: "GFPGANv1.4.pth"
